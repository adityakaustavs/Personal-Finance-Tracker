spring.application.name=finance-tracker
server.port=8080
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/finance_tracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-256-bit-secret-key-for-production-now}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:4200}
