<main class="auth-shell d-flex align-items-center justify-content-center p-3"><section class="card auth-card p-4"><h1 class="h3 text-center mb-1">Welcome back</h1><p class="text-muted text-center mb-4">Sign in to manage your money.</p><div class="alert alert-danger" *ngIf="error">{{error}}</div><form [formGroup]="form" (ngSubmit)="submit()"><div class="mb-3"><label class="form-label">Username</label><input class="form-control" formControlName="username" autocomplete="username"><small class="text-danger" *ngIf="form.controls.username.touched&&form.controls.username.invalid">Username is required.</small></div><div class="mb-4"><label class="form-label">Password</label><input type="password" class="form-control" formControlName="password" autocomplete="current-password"><small class="text-danger" *ngIf="form.controls.password.touched&&form.controls.password.invalid">Password is required.</small></div><button class="btn btn-primary w-100" [disabled]="loading">{{loading?'Signing in…':'Sign in'}}</button></form><p class="text-center mt-4 mb-0">New here? <a routerLink="/signup">Create an account</a></p></section></main>
