<main class="auth-shell d-flex align-items-center justify-content-center p-3"><section class="card auth-card p-4"><h1 class="h3 text-center mb-1">Create your account</h1><p class="text-muted text-center mb-4">Start tracking with confidence.</p><div class="alert alert-danger" *ngIf="error">{{error}}</div><form [formGroup]="form" (ngSubmit)="submit()"><div class="mb-3"><label class="form-label">Username</label><input class="form-control" formControlName="username"><small class="text-danger" *ngIf="form.controls.username.touched&&form.controls.username.invalid">At least 3 characters.</small></div><div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" formControlName="email"><small class="text-danger" *ngIf="form.controls.email.touched&&form.controls.email.invalid">Enter a valid email.</small></div><div class="mb-4"><label class="form-label">Password</label><input type="password" class="form-control" formControlName="password"><small class="text-danger" *ngIf="form.controls.password.touched&&form.controls.password.invalid">At least 8 characters.</small></div><button class="btn btn-primary w-100" [disabled]="loading">{{loading?'Creating…':'Create account'}}</button></form><p class="text-center mt-4 mb-0">Already registered? <a routerLink="/login">Sign in</a></p></section></main>
