<main class="container py-4"><div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4"><div><h1 class="h2 mb-1">Dashboard</h1><p class="text-muted mb-0">Your current monthly financial picture.</p></div><div class="input-group" style="width:220px"><select class="form-select" [(ngModel)]="format"><option value="csv">CSV report</option><option value="pdf">PDF report</option></select><button class="btn btn-primary" (click)="download()">Download Report</button></div></div><div class="alert alert-danger" *ngIf="error">{{error}}</div><div class="row g-3 mb-4" *ngIf="summary"><div class="col-md-4"><div class="card stat-card p-3"><span class="text-muted">Monthly income</span><span class="display-6 text-success">{{summary.monthlyIncome|currency}}</span></div></div><div class="col-md-4"><div class="card stat-card p-3"><span class="text-muted">Monthly expenses</span><span class="display-6 text-danger">{{summary.monthlyExpense|currency}}</span></div></div><div class="col-md-4"><div class="card stat-card p-3"><span class="text-muted">Monthly balance</span><span class="display-6" [class.text-danger]="summary.monthlyBalance<0" [class.text-primary]="summary.monthlyBalance>=0">{{summary.monthlyBalance|currency}}</span></div></div></div><div class="row g-4"><section class="col-lg-5"><div class="card p-3"><h2 class="h5">Expenses by category</h2><div class="chart-wrap"><canvas baseChart [data]="pieData" [type]="'pie'" [options]="options"></canvas></div></div></section><section class="col-lg-7"><div class="card p-3"><h2 class="h5">Income vs. expenses</h2><div class="chart-wrap"><canvas baseChart [data]="barData" [type]="'bar'" [options]="options"></canvas></div></div></section></div></main>
